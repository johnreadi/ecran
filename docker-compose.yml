version: '3.8'

services:
  # Backend API + WebSocket
  api:
    build:
      context: ./slide-effect-server
      dockerfile: Dockerfile
    container_name: slide-effect-api
    restart: unless-stopped
    expose:
      - "4003"
    volumes:
      - ./data:/app/data
    environment:
      - PORT=4003
      - JWT_SECRET=${JWT_SECRET:-slide-effect-secret-change-in-prod}
      - CORS_ORIGIN=${CORS_ORIGIN:-https://ecran.ireadi.net}
    networks:
      - dokploy-overlay

  # Editor (React app)
  editor:
    build:
      context: ./slide-effect-app
      dockerfile: Dockerfile
    container_name: slide-effect-editor
    restart: unless-stopped
    expose:
      - "80"
    networks:
      - dokploy-overlay
    depends_on:
      - api

  # Player (React app for TVs)
  player:
    build:
      context: ./slide-effect-player
      dockerfile: Dockerfile
    container_name: slide-effect-player
    restart: unless-stopped
    expose:
      - "80"
    networks:
      - dokploy-overlay
    depends_on:
      - api

  # Nginx reverse proxy
  nginx:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    container_name: slide-effect-nginx
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      - api
      - editor
      - player
    networks:
      - dokploy-overlay

networks:
  dokploy-overlay:
    external: true
    name: dokploy-overlay
